name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (build or release)'
        required: false
        default: build

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package .app as zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r SocialPanel-macOS.zip "Social Panel.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SocialPanel-macOS
          path: build/macos/Build/Products/Release/SocialPanel-macOS.zip
          retention-days: 7
