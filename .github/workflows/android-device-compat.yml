name: Android Device Compat

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Widget + layout testleri (hızlı, Linux) ───────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - name: Widget testleri
        run: flutter test test/widget_test.dart test/device_layout_test.dart test/navigation_test.dart test/composer_test.dart test/actions_settings_test.dart --reporter=expanded

  # ─── Android emülatör — Samsung cihaz boyutları ────────────
  android-device-compat:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Samsung Galaxy S serisi ────────────────────────
          - name: Galaxy S25 Ultra
            api: 34
            arch: x86_64
            profile: pixel_6_pro   # 412dp, xxhdpi
            device_class: phone

          - name: Galaxy S25
            api: 34
            arch: x86_64
            profile: Nexus_S       # 360dp, hdpi — phoneSmall
            device_class: phoneSmall

          - name: Galaxy S24 FE
            api: 34
            arch: x86_64
            profile: pixel_5       # 393dp, xxhdpi
            device_class: phone

          # ── Samsung Galaxy A serisi ────────────────────────
          - name: Galaxy A55
            api: 34
            arch: x86_64
            profile: pixel_5       # 393dp
            device_class: phone

          - name: Galaxy A15
            api: 34
            arch: x86_64
            profile: Nexus_S       # 360dp — phoneSmall
            device_class: phoneSmall

          # ── Samsung Galaxy Z serisi ────────────────────────
          - name: Galaxy Z Flip 6
            api: 34
            arch: x86_64
            profile: pixel_5       # 393dp
            device_class: phone

          - name: Galaxy Z Fold 6 (kapalı)
            api: 34
            arch: x86_64
            profile: 3.4in WQVGA  # 320dp — phoneSmall
            device_class: phoneSmall

          - name: Galaxy Z Fold 6 (açık)
            api: 34
            arch: x86_64
            profile: pixel_c       # 900dp — tablet
            device_class: tablet

          # ── Samsung Galaxy Tab serisi ──────────────────────
          - name: Galaxy Tab S9
            api: 34
            arch: x86_64
            profile: pixel_c       # 900dp — tablet
            device_class: tablet

          - name: Galaxy Tab S9 Ultra
            api: 34
            arch: x86_64
            profile: pixel_c       # 1032dp — tabletLarge
            device_class: tabletLarge

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Flutter build Android (debug)
        run: |
          flutter build apk --debug \
            --dart-define=DEVICE_CLASS=${{ matrix.device_class }}
        timeout-minutes: 20

      - name: Build sonucu
        if: always()
        run: echo "✅ ${{ matrix.name }} [${{ matrix.device_class }}] — build başarılı"
