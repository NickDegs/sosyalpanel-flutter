name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Kod analizi + unit testler (Linux, hızlı) ────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - name: Tüm testler
        run: flutter test --reporter=expanded

  # ─── iOS Simulator uyumluluk testi — her 2026 cihaz modeli ────────────────
  ios-device-compat:
    needs: test
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── iPhone ──────────────────────────────────────────────────────────
          - name: iPhone 16e
            sim: "iPhone 16e"
            device_class: phone
          - name: iPhone 17
            sim: "iPhone 17"
            device_class: phone
          - name: iPhone 17 Air
            sim: "iPhone 17 Air"
            device_class: phoneLarge
          - name: iPhone 17 Pro
            sim: "iPhone 17 Pro"
            device_class: phone
          - name: iPhone 17 Pro Max
            sim: "iPhone 17 Pro Max"
            device_class: phoneLarge
          # ── iPad ────────────────────────────────────────────────────────────
          - name: iPad mini 7
            sim: "iPad mini (7th generation)"
            device_class: tabletSmall
          - name: iPad 11th gen
            sim: "iPad (11th generation)"
            device_class: tablet
          - name: iPad Air 11 M3
            sim: "iPad Air 11-inch (M3)"
            device_class: tablet
          - name: iPad Air 13 M3
            sim: "iPad Air 13-inch (M3)"
            device_class: tabletLarge
          - name: iPad Pro 11 M4
            sim: "iPad Pro 11-inch (M4)"
            device_class: tablet
          - name: iPad Pro 13 M4
            sim: "iPad Pro 13-inch (M4)"
            device_class: tabletLarge

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcrun xcodebuild -version

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: SPM bağımlılıklarını önceden çöz (timeout retry x3)
        run: |
          cd ios
          for attempt in 1 2 3; do
            echo "SPM resolve attempt $attempt/3"
            xcodebuild -resolvePackageDependencies \
              -workspace Runner.xcworkspace \
              -scheme Runner \
              -clonedSourcePackagesDirPath ~/.spm-cache \
              2>&1 | tail -5 && break || {
              [ $attempt -lt 3 ] && echo "Timeout, 20s sonra tekrar..." && sleep 20
            }
          done
          cd ..

      - name: Boot simulator — ${{ matrix.name }}
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          name = '${{ matrix.sim }}'
          for runtime, devs in d.get('devices', {}).items():
              for dev in devs:
                  if dev.get('name') == name and dev.get('isAvailable'):
                      print(dev['udid'])
                      exit()
          " 2>/dev/null || true)

          if [ -z "$UDID" ]; then
            echo "Simulator '${{ matrix.sim }}' bulunamadı — mevcut cihazlar:"
            xcrun simctl list devices available | grep -E "iPhone|iPad" | head -20
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SIM_UDID=$UDID" >> $GITHUB_ENV
            xcrun simctl boot "$UDID" 2>/dev/null || true
          fi

      - name: Flutter build iOS (debug) — ${{ matrix.name }}
        if: env.SKIP != 'true'
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt/3"
            flutter build ios --debug --no-codesign \
              --dart-define=DEVICE_CLASS=${{ matrix.device_class }} \
              --simulator && break || {
              [ $attempt -lt 3 ] && echo "Başarısız, 15s sonra tekrar..." && sleep 15
            }
          done
        env:
          SIM_UDID: ${{ env.SIM_UDID }}

      - name: Simulator build sonucu
        if: always()
        run: |
          if [ "$SKIP" = "true" ]; then
            echo "⚠️  ${{ matrix.name }} — simulator mevcut değil, atlandı"
          else
            echo "✅  ${{ matrix.name }} [${{ matrix.device_class }}] — build başarılı"
          fi
