name: iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (beta/release)'
        default: 'beta'
        required: true

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Decode App Store Connect API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p fastlane/keys
          echo "$ASC_KEY_BASE64" | base64 --decode > fastlane/keys/AuthKey_GWS48RC387.p8

      - name: Import Distribution Certificate to Keychain
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_P12_PASSWORD }}
        run: |
          mkdir -p /tmp/ios_certs
          echo "$DIST_CERT_P12" | base64 --decode > /tmp/ios_certs/distribution.p12
          security create-keychain -p "ci_keychain_pw" ci.keychain
          security list-keychains -d user -s ci.keychain login.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci_keychain_pw" ci.keychain
          security set-keychain-settings -t 3600 -u ci.keychain
          security import /tmp/ios_certs/distribution.p12 -k ci.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci_keychain_pw" ci.keychain
          echo "=== Imported identities ==="
          security find-identity -v -p codesigning ci.keychain || true

      - name: Run Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ github.workspace }}/fastlane/keys/AuthKey_GWS48RC387.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane ios ${{ github.event.inputs.lane || 'beta' }}
