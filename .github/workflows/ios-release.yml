name: iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (beta/release)'
        default: 'beta'
        required: true

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Decode App Store Connect API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p fastlane/keys
          echo "$ASC_KEY_BASE64" | base64 --decode > fastlane/keys/AuthKey_GWS48RC387.p8

      - name: Import Distribution Certificate to Keychain
        env:
          APPLE_DIST_CERT_P12_BASE64: ${{ secrets.IOS }}
          APPLE_DIST_CERT_P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_P12_PASSWORD }}
        run: |
          echo "$APPLE_DIST_CERT_P12_BASE64" | base64 --decode > /tmp/dist_cert.p12

          # CI keychain oluştur ve yapılandır
          security create-keychain -p "ci_pass_123" ci_build.keychain
          security set-keychain-settings -lut 21600 ci_build.keychain
          security unlock-keychain -p "ci_pass_123" ci_build.keychain

          # Mevcut arama listesine ekle (login keychain'i kaldırma)
          security list-keychains -d user -s ci_build.keychain \
            $(security list-keychains -d user | sed s/\"//g)

          # Apple WWDR ara sertifikalarını indir (sertifika zinciri için gerekli)
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
            -o /tmp/AppleWWDRCAG3.cer
          curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer \
            -o /tmp/AppleWWDRCAG6.cer
          security import /tmp/AppleWWDRCAG3.cer -k ci_build.keychain -T /usr/bin/codesign
          security import /tmp/AppleWWDRCAG6.cer -k ci_build.keychain -T /usr/bin/codesign

          # Dağıtım sertifikasını import et
          security import /tmp/dist_cert.p12 -k ci_build.keychain \
            -P "$APPLE_DIST_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "ci_pass_123" ci_build.keychain

          rm /tmp/dist_cert.p12
          # Doğrula
          security find-identity -v -p codesigning ci_build.keychain

      - name: Run Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ github.workspace }}/fastlane/keys/AuthKey_GWS48RC387.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane ios ${{ github.event.inputs.lane || 'beta' }}
