name: iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (beta/release)'
        default: 'beta'
        required: true

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Decode App Store Connect API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p fastlane/keys
          echo "$ASC_KEY_BASE64" | base64 --decode > fastlane/keys/AuthKey_GWS48RC387.p8

      - name: Ensure Distribution cert slot available
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_PATH: ${{ github.workspace }}/fastlane/keys/AuthKey_GWS48RC387.p8
        run: |
          pip3 install PyJWT cryptography --quiet 2>/dev/null
          python3 << 'PYEOF'
          import jwt, time, requests, os, json

          key_id    = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          key_path  = os.environ['KEY_PATH']

          with open(key_path) as f:
              private_key = f.read()

          token = jwt.encode(
              {'iss': issuer_id, 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'},
              private_key, algorithm='ES256', headers={'kid': key_id}
          )

          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          base = 'https://api.appstoreconnect.apple.com/v1'

          r = requests.get(f'{base}/certificates?filter[certificateType]=DISTRIBUTION', headers=headers)
          certs = r.json().get('data', [])
          print(f'Mevcut Distribution sertifika sayisi: {len(certs)}')

          if len(certs) >= 2:
              oldest = sorted(certs, key=lambda c: c['attributes']['expirationDate'])[0]
              cert_id = oldest['id']
              name    = oldest['attributes']['displayName']
              print(f'Limit doldu — en eski iptal ediliyor: {name} ({cert_id})')
              dr = requests.delete(f'{base}/certificates/{cert_id}', headers=headers)
              print('Iptal edildi.' if dr.status_code == 204 else f'Hata: {dr.status_code} {dr.text}')
          else:
              print('Slot musait, islem gerekmiyor.')
          PYEOF

      - name: Run Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ github.workspace }}/fastlane/keys/AuthKey_GWS48RC387.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane ios ${{ github.event.inputs.lane || 'beta' }}
