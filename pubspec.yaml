name: sosyalpanel
description: 14 sosyal medya platformunu tek panelden yönet.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Local database
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # Secure storage (Keychain / Keystore)
  flutter_secure_storage: ^9.2.4

  # HTTP
  http: ^1.2.2

  # OAuth / web auth
  flutter_web_auth_2: ^4.0.0

  # In-app purchases
  in_app_purchase: ^3.2.0

  # AdMob
  google_mobile_ads: ^8.0.0

  # Charts
  fl_chart: ^0.70.2

  # Apple Sign In
  sign_in_with_apple: ^6.1.3

  # Shared prefs (UserDefaults)
  shared_preferences: ^2.3.5

  # URL launcher
  url_launcher: ^6.3.1

  # Intl
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.2

flutter:
  uses-material-design: true
  generate: true
